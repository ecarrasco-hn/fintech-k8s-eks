apiVersion: v1
kind: ConfigMap

metadata:
  name: frontend-nginx-config
  namespace: fintech

data:
  default.conf: |
    server {

      listen 80;

      location / {

        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;

      }

      location /api/ {

        proxy_pass http://backend-service:3001/;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

      }

    }
